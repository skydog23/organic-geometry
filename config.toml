#baseURL = "https://skydog23.github.io/organic-geometry"
baseURL = "http://localhost:1313/"
languageCode = 'en-us'
title = 'The World of Organic Geometry'
theme = 'ananke'
relativeURLs = true
canonifyURLs = true
[markup]
  [markup.goldmark]
  [markup.goldmark.renderer]
    unsafe=true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['$', '$']]
[params]
  math = true
